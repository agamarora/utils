name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            luna-monitor/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('luna-monitor/Cargo.lock') }}

      - name: Build
        working-directory: luna-monitor
        run: cargo build --workspace

      - name: Test
        working-directory: luna-monitor
        run: cargo test --workspace

      - name: Build release
        working-directory: luna-monitor
        run: cargo build --release --workspace
