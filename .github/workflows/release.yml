name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        working-directory: luna-monitor
        run: cargo build --release --workspace

      - name: Test
        working-directory: luna-monitor
        run: cargo test --workspace

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: luna-monitor/target/release/luna-monitor.exe
          generate_release_notes: true
